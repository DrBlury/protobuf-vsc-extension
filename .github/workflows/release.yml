name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to package, for example v1.2.3'
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v1.2.3, optionally with semver prerelease/build metadata."
            echo "Received: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          VSIX_PATH="protobuf-vsc-${VERSION}.vsix"

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "vsix_path=$VSIX_PATH"
          } >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Update package.json version
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          npm pkg get version
          echo "Updated package metadata to version ${{ steps.version.outputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Generate SBOM for Release
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-file release-sbom.json --output-format json

      - name: Run Grype Security Scan
        uses: anchore/scan-action@v7
        with:
          path: '.'
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          output-file: release-grype.sarif

      - name: Upload Release SBOM
        uses: actions/upload-artifact@v7
        with:
          name: release-sbom
          path: release-sbom.json
          retention-days: 90

      - name: Dependency Audit
        run: npm audit --omit=dev --audit-level=critical

      - name: Package extension
        run: npm run package -- --out "${{ steps.version.outputs.vsix_path }}"

      - name: Verify packaged extension exists
        run: test -f "${{ steps.version.outputs.vsix_path }}"

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Changes

          - Improves parser recovery for unnamed message, enum, and service declarations while keeping the syntax errors visible.
          - Prevents format-on-save from renumbering fields unless renumber-on-format is enabled.
          - Makes built-in diagnostics quieter by default, focusing on invalid schema and import issues.
          - Keeps style, deprecated-usage, documentation, cleanup, and non-canonical import checks available as opt-in diagnostics.
          - Keeps missing-import quick fixes available without adding suggested edits to diagnostic messages.
          - Updates diagnostics documentation and regression coverage.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ${{ steps.version.outputs.vsix_path }}
            release-sbom.json
          fail_on_unmatched_files: true
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx --yes ovsx publish "${{ steps.version.outputs.vsix_path }}"

      - name: Skip Open VSX publish
        if: ${{ env.OVSX_PAT == '' }}
        run: echo "OPEN_VSX_TOKEN is not configured; skipping Open VSX publish."
